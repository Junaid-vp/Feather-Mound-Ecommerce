name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to project directory
            cd ~/ecommerce
            
            # Pull latest changes
            git pull origin main
            
            # Backend Setup
            cd Back_End
            npm install --production
            
            # Restart Application with PM2
            # Assuming the process name is 'ecommerce-backend' or 'server'
            # Adjust the name below to match your PM2 process name
            pm2 restart server || pm2 start server.js --name "server"
            
            # Optional: Frontend Build (if serving static files from the same server)
            # cd ../Front_End
            # npm install
            # npm run build
